version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    groups:
      node-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"