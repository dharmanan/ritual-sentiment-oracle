name: Solidity Security
"on":
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  slither:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither and solc
        run: |
          python -m pip install --upgrade pip
          pip install slither-analyzer
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          $HOME/.local/bin/solc-select install 0.8.30
          $HOME/.local/bin/solc-select use 0.8.30

      - name: Run Slither
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          slither contracts/ScheduledMarketWatcher.sol \
            --solc-args "--via-ir --optimize --optimize-runs 200" \
            --exclude low-level-calls,reentrancy-benign